<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <link rel='icon' type='image/svg+xml' href='favicon.svg'>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Profile — Bali Guest Portal</title>
  <link rel="stylesheet" href="css/global.css"/>
  <style>
    body { background: var(--primary); }

    .dashboard-wrap {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    @media (max-width: 1023px) { 
      .dashboard-wrap { grid-template-columns: 1fr; } 
    }

    /* SIDEBAR */
    .dash-sidebar {
      background: var(--primary);
      border-right: 1px solid var(--secondary-15);
      padding: 32px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 1100;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* BRANDING */
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px 28px;
      border-bottom: 1px solid var(--secondary-10);
      margin-bottom: 16px;
    }

    @media (max-width: 1023px) { 
      .dash-sidebar { 
        position: fixed;
        left: 0;
        top: 0;
        width: 280px;
        transform: translateX(-100%);
        box-shadow: 20px 0 50px rgba(0,0,0,0.5);
      }
      .dash-sidebar.open {
        transform: translateX(0);
      }
    }

    .sidebar-lbl {
      font-family: var(--font-body); font-size: 0.58rem; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--text-dim); padding: 8px 20px 4px; display: block;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px; padding: 11px 20px;
      color: var(--text-muted); font-size: 0.85rem; font-family: var(--font-body);
      transition: var(--transition); cursor: pointer; text-decoration: none;
    }
    .sidebar-link:hover, .sidebar-link.active {
      background: var(--secondary-15); color: var(--secondary);
      border-right: 2px solid var(--secondary);
    }
    .sidebar-link svg { width: 15px; height: 15px; }

    .dash-main { padding: 36px; overflow-x: hidden; }
    @media (max-width: 767px) { .dash-main { padding: 20px 16px; } }

    /* TOPBAR */
    .dash-topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
      position: relative;
    }
    .mobile-nav-toggle {
      display: none;
      background: var(--secondary-08);
      border: 1px solid var(--secondary-30);
      color: var(--secondary);
      width: 42px;
      height: 42px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
    }
    @media (max-width: 1023px) {
      .mobile-nav-toggle { display: flex; }
    }
    .dash-welcome h1 { font-size: 1.8rem; margin-bottom: 3px; }
    .dash-welcome p { font-size: 0.78rem; color: var(--text-dim); font-family: var(--font-body); letter-spacing: 1px; }

    /* PANELS */
    .dash-panel {
      background: var(--secondary-08); border: var(--border-gold); overflow: hidden; margin-bottom: 24px;
    }
    .panel-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px; border-bottom: 1px solid var(--secondary-15);
    }
    .panel-hdr h3 { font-size: 0.9rem; letter-spacing: 0.5px; }
    .panel-body { padding: 22px; }

    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 767px) { .form-grid-2 { grid-template-columns: 1fr; } }
    
    .profile-header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
    }
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid var(--secondary);
      object-fit: cover;
    }
    .profile-header-info h2 { font-size: 1.5rem; }
    .profile-header-info p { font-size: 0.88rem; color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="dashboard-wrap">
    <!-- SIDEBAR -->
    <aside class="dash-sidebar" id="dashSidebar">
      <div class="sidebar-brand">
        <a href="index.html" class="brand-logo-wrap" aria-label="Bali home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/>
            <path d="M12 6c0 0-4 3-4 6s4 6 4 6 4-3 4-6-4-6-4-6z"/>
            <path d="M6 12h12"/>
          </svg>
        </a>
        <a href="index.html" class="brand-name">BA<span>LI</span></a>
      </div>
      <span class="sidebar-lbl">Guest Portal</span>
      <a class="sidebar-link" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Dashboard</a>
      <a class="sidebar-link" href="dash-bookings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg> My Booking</a>

      <span class="sidebar-lbl">Reserve</span>
      <a class="sidebar-link" href="dash-villa.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Book a Villa</a>
      <a class="sidebar-link" href="dash-spa.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a10 10 0 010 20"/><path d="M12 6c2 2 4 4 4 6s-2 4-4 6"/></svg> Spa Appointment</a>
      <a class="sidebar-link" href="dash-excursions.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20"/></svg> Excursions</a>

      <span class="sidebar-lbl">My Account</span>
      <a class="sidebar-link active" href="dash-profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Profile</a>
      <a class="sidebar-link" href="dash-past-stays.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg> Past Stays</a>
      
      <!-- TOGGLES -->
      <div class="sidebar-toggles" style="margin-top:auto; padding: 24px 20px; border-top: 1px solid var(--secondary-10); display: flex; flex-direction: column; gap: 12px;">
        
        <a href="index.html" class="sidebar-link logout-btn" style="color: #ff6b6b; padding: 10px 0; border-top: 1px solid var(--secondary-10); justify-content: flex-start; gap: 10px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:16px; height:16px;"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout
        </a>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="dash-main">
      <div class="dash-topbar">
        <button class="mobile-nav-toggle" id="sidebarToggle" aria-label="Toggle Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="dash-welcome">
          <h1>My <span class="gradient-text">Profile</span></h1>
        </div>
        <div class="dash-topbar-right">
          <div class="dash-header-toggles">
            <button class="toggle-btn rtl-toggle" aria-label="Toggle RTL" style="background: var(--secondary-08); border: 1px solid var(--secondary-15); color: var(--secondary); height: 38px; padding: 0 12px; border-radius: 2px; font-family: var(--font-body); font-size: 0.65rem; letter-spacing: 1px;">RTL</button>
            <button class="toggle-btn theme-toggle" aria-label="Toggle theme" style="width:38px; height:38px; background: var(--secondary-08); border: 1px solid var(--secondary-15); color: var(--secondary); display: flex; align-items: center; justify-content: center; border-radius: 50%;">☀️</button>
          </div>
         
        </div>
      </div>

      <div class="profile-header">
        <img class="profile-avatar" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&q=80" alt=""/>
        <div class="profile-header-info">
          <h2>Maria Anders</h2>
          <p>Member since July 2024 · Gold Guest Status</p>
        </div>
      </div>

      <div class="dash-panel">
        <div class="panel-hdr"><h3>Personal Information</h3></div>
        <div class="panel-body">
          <form>
            <div class="form-grid-2">
              <div class="form-group"><label>First Name</label><input type="text" class="form-control" value="Maria"/></div>
              <div class="form-group"><label>Last Name</label><input type="text" class="form-control" value="Anders"/></div>
            </div>
            <div class="form-grid-2">
              <div class="form-group"><label>Email Address</label><input type="email" class="form-control" value="maria.anders@example.com"/></div>
              <div class="form-group"><label>Phone Number</label><input type="tel" class="form-control" value="+1 (555) 123-4567"/></div>
            </div>
            <div class="form-group"><label>Address</label><textarea class="form-control" rows="2">123 Tropical Way, Sunset District, Oslo</textarea></div>
            <button class="btn btn-primary" type="button" onclick="window.showToast?.('Profile updated successfully.')">Update Profile ✦</button>
          </form>
        </div>
      </div>

      <div class="dash-panel">
        <div class="panel-hdr"><h3>Stay Preferences</h3></div>
        <div class="panel-body">
            <div class="form-group"><label>Dietary Requirements</label><input type="text" class="form-control" placeholder="e.g. Vegan, Gluten-free, Nut allergies…"/></div>
            <div class="form-group"><label>Pillow Preference</label><select class="form-control"><option>Feather</option><option>Memory Foam</option><option>Latex</option><option>Firm</option></select></div>
            <button class="btn btn-outline" type="button">Save Preferences</button>
        </div>
      </div>
    </main>
  </div>

  <script src="js/global.js"></script>
  <script>
    const sidebar = document.getElementById('dashSidebar');
    const toggle = document.getElementById('sidebarToggle');
    if (toggle && sidebar) {
      toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        sidebar.classList.toggle('open');
      });
      document.addEventListener('click', (e) => {
        if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== toggle) {
          sidebar.classList.remove('open');
        }
      });
    }
  </script>
</body>
</html>
